services:
  postgres:
    image: postgres:16
    container_name: warehouse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warehouse} -d ${POSTGRES_DB:-warehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.example
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-warehouse}:${POSTGRES_PASSWORD:-warehouse}@postgres:5432/${POSTGRES_DB:-warehouse}
    volumes:
      - ./airflow:/opt/airflow/airflow
      - ./dbt:/opt/airflow/dbt
      - ./scripts:/opt/airflow/scripts
    command: >
      bash -c "airflow db migrate &&
      (airflow users create --role Admin --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname Local --lastname Admin
      --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true)"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: warehouse-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: .env.example
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-warehouse}:${POSTGRES_PASSWORD:-warehouse}@postgres:5432/${POSTGRES_DB:-warehouse}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow:/opt/airflow/airflow
      - ./dbt:/opt/airflow/dbt
      - ./scripts:/opt/airflow/scripts
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: warehouse-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: .env.example
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-warehouse}:${POSTGRES_PASSWORD:-warehouse}@postgres:5432/${POSTGRES_DB:-warehouse}
    volumes:
      - ./airflow:/opt/airflow/airflow
      - ./dbt:/opt/airflow/dbt
      - ./scripts:/opt/airflow/scripts
    command: scheduler

  dbt:
    build:
      context: .
      dockerfile: docker/dbt/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.example
    volumes:
      - ./dbt:/app/dbt
      - ./scripts:/app/scripts
    working_dir: /app/dbt
    profiles:
      - tools
    command: ["dbt", "--version"]

volumes:
  postgres_data:
